<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CS1812 OOP II Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'CS1812 OOP II',
      repo: 'https://github.com/NickEvans4130/CS1812',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 2,
      darklightTheme: {
        defaultTheme: 'light',
        siteFont: 'PT Sans',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        dark: {
          background: '#1c2028',
          sidebar: '#252b34',
        },
        light: {
          background: '#ffffff',
          sidebar: '#f5f5f5',
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
